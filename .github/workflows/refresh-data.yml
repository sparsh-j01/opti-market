name: Refresh market data

# Build-time treasury refresh. Runs every 3 days and on every push to main.
# Fetches the live Treasury curve, re-stages static assets, and commits the
# result — which triggers a Vercel redeploy with a fresh curve. $0 at runtime.

on:
  schedule:
    - cron: "0 6 */3 * *" # 06:00 UTC every 3rd day
  push:
    branches: [main]
    paths:
      - "data/real_bonds.csv"
      - "scripts/refresh_treasury.py"
      - "scripts/sync_frontend_assets.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh treasury snapshot
        run: python scripts/refresh_treasury.py

      - name: Re-stage frontend static assets
        run: python scripts/sync_frontend_assets.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/treasury_snapshot.json frontend/public/data
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore(data): refresh treasury snapshot"
            git push
          fi
