name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    name: Repo hygiene (no attribution)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan tracked files + branch commits
        run: bash scripts/check_no_attribution.sh

  python-tests:
    name: Backend (pytest — parity oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify generated assets are in sync
        run: |
          python scripts/bake_real_bonds.py
          python scripts/sync_frontend_assets.py
          git diff --exit-code data/real_bonds.csv frontend/public/py frontend/public/data \
            || (echo "::error::Run scripts/bake_real_bonds.py + sync_frontend_assets.py and commit." && exit 1)

      - name: Run pytest
        run: pytest tests/ -v

  frontend-build:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache vendored Pyodide
        uses: actions/cache@v4
        with:
          path: frontend/public/pyodide
          key: pyodide-${{ hashFiles('frontend/scripts/vendor-pyodide.mjs') }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
